name: Package Validation Linux

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Python package name to validate and publish
        required: true
        type: string
      package_version:
        description: Leave blank or use latest for newest version
        required: false
        default: latest
        type: string
      publish_to_feed:
        description: Publish release plus README/packages.json updates to this repo after approval
        required: true
        default: false
        type: boolean

defaults:
  run:
    shell: bash

env:
  PACKAGE_NAME: ${{ inputs.package_name }}
  PACKAGE_VERSION: ${{ inputs.package_version }}
  TARGET_GITHUB_REPOSITORY: ${{ github.repository }}
  SNYK_ORG: ${{ secrets.SNYK_ORG }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  security-scan:
    name: Security Vetting Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Resolve canonical package name
        run: |
          requested="$(printf '%s' "${{ inputs.package_name }}" | xargs)"
          case "${requested,,}" in
            airflow) canonical="apache-airflow" ;;
            jupyter-notebook) canonical="notebook" ;;
            *) canonical="$requested" ;;
          esac
          {
            echo "REQUESTED_PACKAGE_NAME=$requested"
            echo "PACKAGE_NAME=$canonical"
          } >> "$GITHUB_ENV"
          if [[ "$canonical" != "$requested" ]]; then
            echo "Using canonical PyPI package '$canonical' for requested package '$requested'."
          fi

      - name: Setup Python virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel

      - name: Download, install and extract package plus dependencies
        run: |
          source venv/bin/activate
          mkdir -p package_download package_extracted
          if [[ -z "${PACKAGE_VERSION// }" || "$PACKAGE_VERSION" == "latest" ]]; then
            pip download "$PACKAGE_NAME" --dest package_download
            pip install "$PACKAGE_NAME"
          else
            pip download "$PACKAGE_NAME==$PACKAGE_VERSION" --dest package_download
            pip install "$PACKAGE_NAME==$PACKAGE_VERSION"
          fi
          python - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          download_dir = Path('package_download')
          extract_dir = Path('package_extracted')
          for artifact in sorted(download_dir.iterdir()):
              if not artifact.is_file():
                  continue
              print(f'Extracting: {artifact.name}')
              try:
                  if artifact.suffix == '.whl':
                      target = extract_dir / f'{artifact.name}-extracted'
                      target.mkdir(parents=True, exist_ok=True)
                      with zipfile.ZipFile(artifact) as wheel:
                          wheel.extractall(target)
                  elif artifact.name.endswith('.tar.gz'):
                      with tarfile.open(artifact, 'r:gz') as source:
                          source.extractall(extract_dir)
              except Exception as exc:
                  print(f'Warning: Could not extract {artifact.name}: {exc}')
          PY
          echo 'Package extraction completed. Directory structure:'
          find package_extracted -maxdepth 2 -type d | sort

      - name: Run comprehensive Snyk scanning
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [[ -z "${SNYK_TOKEN:-}" ]]; then
            echo 'Missing required secret: SNYK_TOKEN' >&2
            exit 1
          fi
          if [[ -z "${SNYK_ORG:-}" ]]; then
            echo 'Missing required secret: SNYK_ORG' >&2
            exit 1
          fi
          SNYK_ORG="$(printf '%s' "$SNYK_ORG" | tr -d '\r\n' | xargs)"
          if [[ -z "$SNYK_ORG" ]]; then
            echo 'SNYK_ORG is empty after trimming whitespace.' >&2
            exit 1
          fi
          echo "SNYK_ORG supplied after trimming. Length: ${#SNYK_ORG}"
          npm install -g snyk
          if ! snyk auth "$SNYK_TOKEN"; then
            echo 'Snyk authentication failed. Check the SNYK_TOKEN repository secret.' >&2
            exit 1
          fi
          echo 'Snyk CLI version:'
          snyk --version
          source venv/bin/activate
          pip freeze > requirements.txt
          echo '=== Installed packages for scanning ==='
          cat requirements.txt
          echo "=== Total packages: $(wc -l < requirements.txt) ==="
          venv_python="$(realpath venv/bin/python)"
          echo '=== Scanning dependencies for known vulnerabilities ==='
          set +e
          snyk test --file=requirements.txt --package-manager=pip --skip-unresolved=true --command="$venv_python" --json-file-output=snyk_dependencies.json > snyk_dependencies_summary.txt 2>&1
          dependency_exit_code=$?
          printf '%s\n' "$dependency_exit_code" > snyk_dependencies_exit_code.txt
          if [[ $dependency_exit_code -eq 0 ]]; then
            echo 'Dependency scan completed successfully'
          else
            echo "Snyk dependency test completed with issues. Exit code: $dependency_exit_code"
          fi
          echo '=== Uploading dependency scan to Snyk dashboard ==='
          snyk monitor --file=requirements.txt --package-manager=pip --skip-unresolved=true --command="$venv_python" --org="$SNYK_ORG" --project-name="${PACKAGE_NAME}-deps-${GITHUB_RUN_NUMBER}" > snyk_monitor_summary.txt 2>&1
          monitor_exit_code=$?
          printf '%s\n' "$monitor_exit_code" > snyk_monitor_exit_code.txt
          if [[ $monitor_exit_code -eq 0 ]]; then
            echo 'Dashboard upload completed successfully'
          else
            echo "Snyk monitor completed with issues. Exit code: $monitor_exit_code"
          fi
          echo '=== Scanning source code for security vulnerabilities ==='
          snyk code test --json-file-output=snyk_code.json package_extracted > snyk_code_summary.txt 2>&1
          code_exit_code=$?
          printf '%s\n' "$code_exit_code" > snyk_code_exit_code.txt
          if [[ $code_exit_code -eq 0 ]]; then
            echo 'Source code scan completed successfully'
          else
            echo "Snyk code test completed with issues. Exit code: $code_exit_code"
          fi
          set -e

      - name: Ready for manual approval review instructions
        run: |
          source venv/bin/activate
          python -m pip install requests
          echo '=========================================='
          echo '  PACKAGE READY FOR SECURITY REVIEW'
          echo '=========================================='
          echo "Package: $PACKAGE_NAME"
          echo "Version: $PACKAGE_VERSION"
          echo "Run URL: $RUN_URL"
          PACKAGE_NAME_FOR_ANALYSIS="$PACKAGE_NAME" python - <<'PY'
          import os
          import requests
          from datetime import datetime, timezone

          def safe_parse_datetime(value):
              if not value:
                  return None
              try:
                  if value.endswith('Z'):
                      value = value[:-1] + '+00:00'
                  parsed = datetime.fromisoformat(value)
                  if parsed.tzinfo is None:
                      parsed = parsed.replace(tzinfo=timezone.utc)
                  return parsed
              except Exception:
                  return None

          package_name = os.environ.get('PACKAGE_NAME_FOR_ANALYSIS', '').replace('_', '-')
          if not package_name:
              print('ERROR: No package name provided for analysis')
              raise SystemExit(0)
          print('PACKAGE ANALYSIS:')
          print('=' * 40)
          try:
              response = requests.get(f'https://pypi.org/pypi/{package_name}/json', timeout=30)
              if response.status_code != 200:
                  print(f'WARNING: Package not found on PyPI: {package_name}')
                  raise SystemExit(0)
              data = response.json()
              info = data['info']
              releases = data['releases']
              print(f"Name: {info['name']}")
              print(f"Latest Version: {info['version']}")
              summary = info.get('summary') or ''
              print(f"Summary: {summary[:80]}..." if len(summary) > 80 else f"Summary: {summary}")
              print(f"Author: {info.get('author') or 'Not specified'}")
              print(f"Maintainer: {info.get('maintainer') or 'Same as author'}")
              classifiers = info.get('classifiers', [])
              os_classifiers = [c for c in classifiers if c.startswith('Operating System ::')]
              print('Operating System Compatibility:')
              if os_classifiers:
                  for classifier in os_classifiers:
                      print(f"    {classifier.split('::')[-1].strip()}")
                  linux_specific = any(any(token in c for token in ('POSIX', 'Linux', 'Unix')) for c in os_classifiers)
                  os_independent = any('OS Independent' in c for c in os_classifiers)
                  if linux_specific:
                      print('OK: Package declares Linux/POSIX/Unix compatibility')
                  elif os_independent:
                      print('OK: Package is OS Independent')
                  else:
                      print('CAUTION: Package has specific OS requirements - review carefully')
              else:
                  print('    UNKNOWN: No OS compatibility information specified')
              upload_times = []
              for files in releases.values():
                  for file_info in files or []:
                      parsed = safe_parse_datetime(file_info.get('upload_time') or file_info.get('upload_time_iso_8601') or '')
                      if parsed:
                          upload_times.append(parsed)
              if upload_times:
                  latest = max(upload_times)
                  days_ago = (datetime.now(timezone.utc) - latest).days
                  print(f"Last Release: {latest.strftime('%Y-%m-%d')} ({days_ago} days ago)")
          except requests.exceptions.RequestException as exc:
              print(f'ERROR: Error fetching package metadata: {exc}')
          print('=' * 40)
          PY
          echo ''
          echo 'SECURITY SCAN RESULTS:'
          echo '========================================'
          if [[ -f snyk_dependencies_summary.txt ]]; then cat snyk_dependencies_summary.txt; fi
          if [[ -f snyk_code_summary.txt ]]; then cat snyk_code_summary.txt; fi
          echo 'NEXT: Manual approval required in PackageApproval environment'

      - name: Generate manifest and README preview
        run: |
          if [[ "$TARGET_GITHUB_REPOSITORY" != */* ]]; then
            echo "Invalid GitHub repository slug: $TARGET_GITHUB_REPOSITORY" >&2
            exit 1
          fi
          target_github_org="${TARGET_GITHUB_REPOSITORY%/*}"
          target_github_repo="${TARGET_GITHUB_REPOSITORY#*/}"
          mkdir -p preview_output
          python scripts/manifest_tools.py upsert-release \
            --manifest-path packages.json \
            --manifest-output preview_output/packages.preview.json \
            --readme-output preview_output/README.preview.md \
            --package-name "$PACKAGE_NAME" \
            --package-version "$PACKAGE_VERSION" \
            --package-dir package_download \
            --repo-owner "$target_github_org" \
            --repo-name "$target_github_repo" \
            --pipeline-url "$RUN_URL" \
            --build-id "$GITHUB_RUN_ID"

      - name: Build Python approval report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p review_output
          python scripts/build_review_report.py \
            --package-name "$PACKAGE_NAME" \
            --package-version "$PACKAGE_VERSION" \
            --requirements requirements.txt \
            --snyk-dependencies-summary snyk_dependencies_summary.txt \
            --snyk-dependencies-exit-code snyk_dependencies_exit_code.txt \
            --snyk-monitor-summary snyk_monitor_summary.txt \
            --snyk-monitor-exit-code snyk_monitor_exit_code.txt \
            --snyk-code-summary snyk_code_summary.txt \
            --snyk-code-exit-code snyk_code_exit_code.txt \
            --snyk-dependencies-json snyk_dependencies.json \
            --snyk-code-json snyk_code.json \
            --manifest-preview preview_output/packages.preview.json \
            --package-dir package_download \
            --run-url "$RUN_URL" \
            --output-dir review_output

      - name: Run AI security review
        if: always()
        env:
          AZURE_AI_FOUNDRY_API_KEY: ${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}
          AZURE_AI_FOUNDRY_API_VERSION: ${{ secrets.AZURE_AI_FOUNDRY_API_VERSION }}
        run: |
          if [[ ! -f review_output/approval-report.json ]]; then
            echo 'approval-report.json missing; skipping AI security review.'
            exit 0
          fi
          python scripts/build_ai_security_review.py \
            --report-json review_output/approval-report.json \
            --report-md review_output/approval-report.md

      - name: Append approval report to step summary
        if: always()
        run: |
          if [[ -f review_output/approval-report.md ]]; then
            cat review_output/approval-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-validation-${{ github.run_id }}
          path: |
            requirements.txt
            snyk_dependencies_summary.txt
            snyk_dependencies_exit_code.txt
            snyk_monitor_summary.txt
            snyk_monitor_exit_code.txt
            snyk_code_summary.txt
            snyk_code_exit_code.txt
            snyk_dependencies.json
            snyk_code.json
            preview_output/packages.preview.json
            preview_output/README.preview.md
            review_output/approval-report.json
            review_output/approval-report.md

  manual-approval:
    name: Manual Approval
    needs: security-scan
    runs-on: ubuntu-latest
    environment:
      name: PackageApproval
    steps:
      - name: Resolve canonical package name
        run: |
          requested="$(printf '%s' "${{ inputs.package_name }}" | xargs)"
          case "${requested,,}" in
            airflow) canonical="apache-airflow" ;;
            jupyter-notebook) canonical="notebook" ;;
            *) canonical="$requested" ;;
          esac
          echo "PACKAGE_NAME=$canonical" >> "$GITHUB_ENV"
      - name: Await approval
        run: echo "Manual approval granted for $PACKAGE_NAME"

  publish-artifact:
    name: Publish Package to GitHub Repository
    needs: manual-approval
    if: ${{ inputs.publish_to_feed }}
    runs-on: ubuntu-latest
    concurrency:
      group: package-manifest-publish-main
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-validation-${{ github.run_id }}
          path: publish_inputs

      - name: Resolve canonical package name
        run: |
          requested="$(printf '%s' "${{ inputs.package_name }}" | xargs)"
          case "${requested,,}" in
            airflow) canonical="apache-airflow" ;;
            jupyter-notebook) canonical="notebook" ;;
            *) canonical="$requested" ;;
          esac
          {
            echo "REQUESTED_PACKAGE_NAME=$requested"
            echo "PACKAGE_NAME=$canonical"
          } >> "$GITHUB_ENV"

      - name: Publish validated package
        env:
          GH_TOKEN: ${{ secrets.REPO_WRITE_TOKEN }}
          REPO_WRITE_TOKEN: ${{ secrets.REPO_WRITE_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo 'Missing required secret: REPO_WRITE_TOKEN' >&2
            exit 1
          fi
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi
          python -m pip install --upgrade pip setuptools wheel
          mkdir -p package_publish

          constraint_args=()
          if [[ -f publish_inputs/requirements.txt ]]; then
            constraint_args=(-c publish_inputs/requirements.txt)
            echo 'Using scanned requirements.txt as publish download constraints.'
          else
            echo 'Scanned requirements.txt not found; publish download will resolve without constraints.'
          fi

          package_spec="$PACKAGE_NAME"
          if [[ -n "${PACKAGE_VERSION// }" && "$PACKAGE_VERSION" != "latest" ]]; then
            package_spec="$PACKAGE_NAME==$PACKAGE_VERSION"
          fi

          download_successful=false
          echo "Downloading $package_spec for Python 3.13 Linux x86_64..."
          if pip download "$package_spec" "${constraint_args[@]}" --dest package_publish --only-binary=:all: --python-version 313 --implementation cp --abi cp313 --platform manylinux_2_28_x86_64; then
            download_successful=true
          elif pip download "$package_spec" "${constraint_args[@]}" --dest package_publish --only-binary=:all: --python-version 313 --implementation cp --abi cp313 --platform manylinux2014_x86_64; then
            download_successful=true
          elif pip download "$package_spec" "${constraint_args[@]}" --dest package_publish --only-binary=:all: --python-version 313 --implementation cp --abi cp313 --platform linux_x86_64; then
            download_successful=true
          elif pip download "$package_spec" "${constraint_args[@]}" --dest package_publish --only-binary=:all:; then
            download_successful=true
          elif pip download "$package_spec" "${constraint_args[@]}" --dest package_publish --no-binary=:all:; then
            download_successful=true
          fi
          mapfile -t package_files < <(find package_publish -maxdepth 1 -type f | sort)
          if [[ "$download_successful" != "true" || ${#package_files[@]} -eq 0 ]]; then
            echo 'No package files were downloaded to publish.' >&2
            exit 1
          fi

          if [[ "$TARGET_GITHUB_REPOSITORY" != */* ]]; then
            echo "Invalid GitHub repository slug: $TARGET_GITHUB_REPOSITORY" >&2
            exit 1
          fi
          target_github_org="${TARGET_GITHUB_REPOSITORY%/*}"
          target_github_repo="${TARGET_GITHUB_REPOSITORY#*/}"

          if ! gh repo view "$TARGET_GITHUB_REPOSITORY" --json name >/dev/null; then
            echo "REPO_WRITE_TOKEN cannot access $TARGET_GITHUB_REPOSITORY. Verify the PAT has Contents: Read and write and Metadata: Read access to this repository." >&2
            exit 1
          fi

          selection_script="$(python - <<'PY'
          import os
          import re
          import shlex
          import sys
          from pathlib import Path

          from packaging.utils import canonicalize_name, parse_sdist_filename, parse_wheel_filename

          package_dir = Path("package_publish")
          package_name = os.environ["PACKAGE_NAME"]
          package_version = (os.environ.get("PACKAGE_VERSION") or "").strip()
          target_name = canonicalize_name(package_name)

          def wheel_rank(file_name: str) -> tuple[int, str]:
              lower_name = file_name.lower()
              if re.search(r"cp313-[^-]*-(manylinux|musllinux).*x86_64\.whl$", lower_name) or re.search(r"cp313-[^-]*-linux_x86_64\.whl$", lower_name):
                  return 0, "Python 3.13 Linux x86_64 wheel"
              if re.search(r"cp\d+-abi3-(manylinux|musllinux).*x86_64\.whl$", lower_name) or re.search(r"cp\d+-abi3-linux_x86_64\.whl$", lower_name):
                  return 1, "ABI3 Linux x86_64 wheel"
              if re.search(r"py3-none-(manylinux|musllinux).*x86_64\.whl$", lower_name) or re.search(r"py3-none-linux_x86_64\.whl$", lower_name):
                  return 2, "Python 3 Linux x86_64 wheel"
              if re.search(r"(py3-none-any|py2\.py3-none-any)\.whl$", lower_name):
                  return 3, "Universal wheel (Python 3+)"
              if lower_name.endswith(".whl"):
                  return 4, "Wheel (check compatibility)"
              if lower_name.endswith(".tar.gz"):
                  return 5, "Source distribution"
              return 99, "Unknown"

          candidates = []
          for file_path in sorted(package_dir.iterdir()):
              if not file_path.is_file():
                  continue
              file_name = file_path.name
              try:
                  if file_name.endswith(".whl"):
                      dist_name, version, _, _ = parse_wheel_filename(file_name)
                  elif file_name.endswith(".tar.gz"):
                      dist_name, version = parse_sdist_filename(file_name)
                  else:
                      continue
              except Exception:
                  continue
              if canonicalize_name(dist_name) != target_name:
                  continue
              rank, install_type = wheel_rank(file_name)
              candidates.append((rank, file_name.lower(), file_path, str(version), install_type))

          if not candidates:
              print(f"Could not identify the downloaded package file for {package_name}.", file=sys.stderr)
              sys.exit(1)

          _, _, selected_file, parsed_version, install_type = min(candidates)
          actual_version = parsed_version
          if package_version and package_version != "latest" and not actual_version:
              actual_version = package_version
          if not actual_version or actual_version == "latest":
              print(f"Could not determine actual package version from downloaded files for {package_name}.", file=sys.stderr)
              sys.exit(1)

          print(f"actual_version={shlex.quote(actual_version)}")
          print(f"select_file={shlex.quote(str(selected_file))}")
          print(f"install_type={shlex.quote(install_type)}")
          PY
          )" || exit 1
          eval "$selection_script"

          if [[ -n "$actual_version" && "$actual_version" != "latest" ]]; then
            release_tag="${PACKAGE_NAME}-v${actual_version}"
            version_display="$actual_version"
          else
            release_tag="${PACKAGE_NAME}-latest"
            version_display="latest"
          fi

          if gh release view "$release_tag" --repo "$TARGET_GITHUB_REPOSITORY" >/dev/null 2>&1; then
            tag_already_exists=true
          else
            tag_already_exists=false
          fi

          filename="$(basename "$select_file")"
          install_cmd="pip install https://github.com/$TARGET_GITHUB_REPOSITORY/releases/download/$release_tag/$filename"
          package_files_list="$(printf -- '- %s\n' "${package_files[@]##*/}")"
          cat > release-notes.md <<EOF
          Security Validated Package

          Package: $PACKAGE_NAME
          Version: $version_display
          Validation Date: $(date +%F)
          Workflow Run: $RUN_URL

          Installation (Python 3.13 on Ubuntu x64 Required)
          $install_cmd

          Package Type: $install_type

          Security Status
          - Vulnerability scan passed or completed with findings review
          - Source code analysis completed
          - Manual security review approved
          - License compliance reviewed

          Package Files
          $package_files_list
          EOF
          release_notes_file='release-notes.md'
          if [[ -f publish_inputs/review_output/approval-report.md ]]; then
            echo 'Using short generated release notes; full approval report will be uploaded as a release asset.'
          fi

          if [[ "$tag_already_exists" == "false" ]]; then
            gh release create "$release_tag" --repo "$TARGET_GITHUB_REPOSITORY" --title "$PACKAGE_NAME v$version_display - Security Validated" --notes-file "$release_notes_file"
            if [[ $? -ne 0 ]]; then
              echo "Failed to create GitHub release $release_tag." >&2
              exit 1
            fi
          else
            gh release edit "$release_tag" --repo "$TARGET_GITHUB_REPOSITORY" --title "$PACKAGE_NAME v$version_display - Security Validated" --notes-file "$release_notes_file"
            if [[ $? -ne 0 ]]; then
              echo "Failed to update GitHub release $release_tag notes." >&2
              exit 1
            fi
          fi

          for file in "${package_files[@]}"; do
            gh release upload "$release_tag" "$file" --repo "$TARGET_GITHUB_REPOSITORY" --clobber
            if [[ $? -ne 0 ]]; then
              echo "Failed to upload $(basename "$file") to release $release_tag." >&2
              exit 1
            fi
          done
          for report_file in publish_inputs/review_output/approval-report.md publish_inputs/review_output/approval-report.json; do
            if [[ -f "$report_file" ]]; then
              gh release upload "$release_tag" "$report_file" --repo "$TARGET_GITHUB_REPOSITORY" --clobber
              if [[ $? -ne 0 ]]; then
                echo "Failed to upload $report_file to release $release_tag." >&2
                exit 1
              fi
            fi
          done

          remote_url="https://x-access-token:${REPO_WRITE_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch "$remote_url" main
          if [[ $? -ne 0 ]]; then
            echo 'Failed to fetch latest main before manifest update.' >&2
            exit 1
          fi
          git checkout -B main FETCH_HEAD
          if [[ $? -ne 0 ]]; then
            echo 'Failed to reset checkout to latest main before manifest update.' >&2
            exit 1
          fi
          python scripts/manifest_tools.py upsert-release \
            --manifest-path packages.json \
            --manifest-output packages.json \
            --readme-output README.md \
            --package-name "$PACKAGE_NAME" \
            --package-version "$PACKAGE_VERSION" \
            --package-dir package_publish \
            --repo-owner "$target_github_org" \
            --repo-name "$target_github_repo" \
            --pipeline-url "$RUN_URL" \
            --build-id "$GITHUB_RUN_ID"
          if [[ $? -ne 0 ]]; then
            echo 'Failed to update manifest and README for published package.' >&2
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages.json README.md bundles
          if git diff --cached --quiet; then
            echo 'No manifest or README changes to commit.'
            exit 0
          fi
          git commit -m "Publish $PACKAGE_NAME v$version_display (manifest update)"
          if [[ $? -ne 0 ]]; then
            echo 'Failed to commit manifest update.' >&2
            exit 1
          fi
          git push "$remote_url" HEAD:main
          if [[ $? -ne 0 ]]; then
            echo 'Failed to push manifest update.' >&2
            exit 1
          fi
